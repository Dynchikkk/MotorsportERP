version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
        - WEB_INTERNAL_PORT=${WEB_INTERNAL_PORT}
    container_name: motorsport-frontend
    restart: always
    depends_on:
      api:
        condition: service_started
    environment:
      - WEB_INTERNAL_PORT=${WEB_INTERNAL_PORT}
    ports:
      - "${WEB_PORT}:${WEB_INTERNAL_PORT}"

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
      args:
        - BUILD_CONFIGURATION=${BUILD_CONFIGURATION}
        - API_INTERNAL_PORT=${API_INTERNAL_PORT}
        - UPLOAD_PATH=${UPLOAD_PATH}
    container_name: motorsport-api
    restart: always
    ports:
      - "${API_PORT}:${API_INTERNAL_PORT}"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - upload_data:${UPLOAD_PATH}
    environment:
      # ENV
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_HTTP_PORTS=${API_INTERNAL_PORT}
      # DB 
      - ConnectionStrings__DefaultConnection=Server=${DB_HOST};Database=${DB_NAME};User=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=True
      # FILE STORAGE
      - MediaFileStorageSettings__UploadsPath=${UPLOAD_PATH}

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: motorsport-db
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "${DB_PORT}:${DB_INTERNAL_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/${DB_INTERNAL_PORT}' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - sql_data:/var/opt/mssql

volumes:
  sql_data:
  upload_data:  
